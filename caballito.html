<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐴 Caballito de Mar - Aprende Jugando</title>
  <link rel="icon" href="images/icono.png" type="image/png">
  <link rel="stylesheet" href="caballito-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Bubblegum+Sans&display=swap" rel="stylesheet">
  
  <style>
    /* SVG del caballito de mar */
    .mascota {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .mascota svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
    }
    
    @media (max-width: 600px) {
      .mascota {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>
  <!-- Burbujas de fondo animadas -->
  <div class="burbujas">
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
  </div>

  <!-- Header -->
  <header class="game-header">
    <button class="mute-btn" onclick="toggleMute()" title="Sonido on/off">
      <span id="sound-icon">🔊</span>
    </button>
    <h1>🐠 Caballito de Mar 🐚</h1>
    <button class="home-btn" onclick="reiniciarJuego()" title="Reiniciar juego">
      🔄 Reiniciar
    </button>
  </header>

  <!-- Contenedor principal del juego -->
  <main class="game-container">
    <!-- El contenido se genera dinámicamente con JavaScript -->
    <div class="mascota-container">
      <div class="mascota" onclick="leerTexto('¡Hola! Soy un caballito de mar.')">
        <!-- SVG del caballito de mar -->
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Cuerpo del caballito -->
          <ellipse cx="50" cy="55" rx="18" ry="30" fill="#FF9F43"/>
          <!-- Cabeza -->
          <circle cx="50" cy="22" r="15" fill="#FF9F43"/>
          <!-- Hocico/nariz alargada -->
          <ellipse cx="65" cy="25" rx="12" ry="5" fill="#FF9F43"/>
          <circle cx="75" cy="25" r="3" fill="#FF6B6B"/>
          <!-- Ojo -->
          <circle cx="52" cy="18" r="5" fill="white"/>
          <circle cx="53" cy="17" r="3" fill="#2C3E50"/>
          <circle cx="54" cy="16" r="1" fill="white"/>
          <!-- Cresta/aleta dorsal -->
          <path d="M 32 20 Q 25 35 32 50 Q 38 45 35 35 Q 42 40 38 30 Q 45 35 40 25 Q 47 28 45 20 Q 42 25 38 18 Q 35 22 32 20" fill="#E74C3C"/>
          <!-- Aleta pectoral -->
          <ellipse cx="68" cy="50" rx="8" ry="4" fill="#FFBE76" transform="rotate(30, 68, 50)"/>
          <!-- Cola enrollada -->
          <path d="M 50 85 Q 40 95 30 90 Q 20 85 25 75 Q 30 65 40 70 Q 45 75 42 80" fill="#FF9F43" stroke="#E67E22" stroke-width="2"/>
          <!-- Barriguita -->
          <ellipse cx="55" cy="60" rx="10" ry="20" fill="#FFE4B5"/>
          <!-- Líneas de la barriga -->
          <path d="M 48 45 Q 55 47 60 45" fill="none" stroke="#FFDAB9" stroke-width="1"/>
          <path d="M 47 52 Q 55 54 61 52" fill="none" stroke="#FFDAB9" stroke-width="1"/>
          <path d="M 46 59 Q 55 61 62 59" fill="none" stroke="#FFDAB9" stroke-width="1"/>
          <path d="M 47 66 Q 55 68 61 66" fill="none" stroke="#FFDAB9" stroke-width="1"/>
          <!-- Mejilla sonrojada -->
          <circle cx="58" cy="28" r="4" fill="#FFB8B8" opacity="0.6"/>
          <!-- Sonrisa -->
          <path d="M 62 30 Q 65 33 68 30" fill="none" stroke="#E74C3C" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    
    <div class="pantalla-inicio">
      <h2>� ¡Aprende sobre los Caballitos de Mar! 🐚</h2>
      <p>¡Hola amiguito! Voy a hacerte unas preguntas divertidas sobre los caballitos de mar. ¡Escucha bien y toca la respuesta correcta!</p>
      <div class="cargando-voz" id="cargando-voz">🔊 Preparando la voz...</div>
      <button class="btn-empezar" onclick="empezarJuego()">
        ¡Empezar! 🎮
      </button>
    </div>
  </main>

  <!-- Audio de éxito -->
  <audio id="audio-exito" src="audio/ok.mp3" preload="auto"></audio>

  <!-- Footer -->
  <footer style="background: rgba(0,0,0,0.2); color: white; text-align: center; padding: 0.8rem; position: relative; z-index: 10;">
    <img src="images/logo11.png" alt="Logo" style="height: 30px; vertical-align: middle; margin-right: 10px;">
    <span style="font-family: 'Fredoka', sans-serif;">Creado por <strong>nemiroff</strong></span>
  </footer>

  <!-- JavaScript del juego -->
  <script src="caballito.js"></script>
  
  <script>
    // Ocultar mensaje de carga cuando la voz esté lista
    document.addEventListener('DOMContentLoaded', function() {
      const checkVoz = setInterval(function() {
        if ('speechSynthesis' in window && speechSynthesis.getVoices().length > 0) {
          const cargando = document.getElementById('cargando-voz');
          if (cargando) {
            cargando.textContent = '✅ ¡Voz lista!';
            setTimeout(() => {
              cargando.style.display = 'none';
            }, 1500);
          }
          clearInterval(checkVoz);
        }
      }, 100);
      
      // Timeout por si no se cargan las voces
      setTimeout(function() {
        clearInterval(checkVoz);
        const cargando = document.getElementById('cargando-voz');
        if (cargando) {
          cargando.style.display = 'none';
        }
      }, 5000);
    });
  </script>
</body>
</html>
